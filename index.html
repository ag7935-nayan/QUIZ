<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultimate Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Start Screen -->
  <div id="startScreen" class="card">
    <h1>Ultimate Quiz</h1>
    <p></p>
    <p class="credit">Presented by Gurukul</p>

    <button id="easyBtn">Easy</button>
    <button id="hardBtn">Hard</button>
  </div>

  <!-- Quiz -->
  <div id="quizBox" class="card hidden">
    <div class="top">
      <span id="timer">60s</span>
      <span id="progress">1 / 30</span>
    </div>

    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

</div>

<!-- TIMER SOUND ONLY -->
<audio id="tickSound" loop>
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-clock-countdown-bleeps-916.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
